name: quality-security-release-gates

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - "codex/**"
      - "sprint-**"

permissions:
  contents: read

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: install dependencies
        run: npm ci

      - name: prepare architecture
        run: npm run prepare:architecture

      - name: run proofs
        run: npm run test:proofs

      - name: typecheck
        run: npm run typecheck

      - name: lint
        run: npm run lint

      - name: build
        run: npm run build

  showroom-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: install dependencies
        run: npm ci

      - name: install playwright chromium
        run: npx playwright install --with-deps chromium

      - name: build
        run: npm run build

      - name: showroom smoke (desktop + mobile chromium)
        run: npm run test:smoke:showroom

  security-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: install dependencies
        run: npm ci

      - name: dependency security audit
        run: npm run security:audit

  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-governance:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: install dependencies
        run: npm ci

      - name: enforce release governance
        run: npm run release:governance

  postgres-parity:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ook_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      OOK_BFF_DATABASE_URL: postgres://postgres:postgres@localhost:5432/ook_test

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: install dependencies
        run: npm ci

      - name: ci supabase-compat (roles, auth.uid, storage, realtime) — CI only
        run: node --import tsx scripts/ci-postgres-supabase-compat.ts

      - name: apply bff migrations to postgres
        run: npm run db:migrate:bff

      - name: postgres settlement parity proofs
        run: node --import tsx --test tests/proofs/postgres-settlement-parity.test.ts
